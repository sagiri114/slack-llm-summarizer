display_information:
  name: Lab AI Agent
features:
  bot_user:
    display_name: lab-ai-agent
    always_online: false
  slash_commands:
    - command: /summary
      description: Summarize recent messages in this channel
      usage_hint: "24h max:100 provider:openai"
      should_escape: false
    - command: /ask
      description: Ask a question based on recent channel context
      usage_hint: "最近 demo 的进展是什么？"
      should_escape: false
    - command: /todo
      description: Extract TODOs from recent channel messages
      usage_hint: "7d"
      should_escape: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - commands
      - groups:history
      - groups:read
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
